<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link Intel - Competitive Intelligence Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="container">
            <h1>Link Intel</h1>
            <p class="subtitle">Competitive intelligence for the link-management space</p>
        </div>
    </header>

    <main class="container">
        <!-- Stats row -->
        <div class="stats-row">
            <div class="stat-card">
                <div class="stat-value" id="stat-signals">--</div>
                <div class="stat-label">Signals</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-jobs">--</div>
                <div class="stat-label">Active Jobs</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-competitors">6</div>
                <div class="stat-label">Competitors</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-updated">--</div>
                <div class="stat-label">Last Updated</div>
            </div>
        </div>

        <!-- Filter buttons -->
        <div class="filter-bar">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="bitly" style="--accent: #ee6123">Bitly</button>
            <button class="filter-btn" data-filter="dub" style="--accent: #7c3aed">Dub</button>
            <button class="filter-btn" data-filter="shortio" style="--accent: #10b981">Short.io</button>
            <button class="filter-btn" data-filter="tinyurl" style="--accent: #f59e0b">TinyURL</button>
            <button class="filter-btn" data-filter="rebrandly" style="--accent: #3b82f6">Rebrandly</button>
            <button class="filter-btn" data-filter="sniply" style="--accent: #ec4899">Sniply</button>
        </div>

        <!-- Signals section -->
        <section class="section">
            <h2>Recent Signals</h2>
            <div id="signals-grid" class="signals-grid">
                <p class="empty-state">Loading...</p>
            </div>
        </section>

        <!-- Jobs section -->
        <section class="section">
            <h2>Job Postings</h2>
            <div class="table-wrap">
                <table id="jobs-table">
                    <thead>
                        <tr>
                            <th>Competitor</th>
                            <th>Title</th>
                            <th>Department</th>
                            <th>Location</th>
                        </tr>
                    </thead>
                    <tbody id="jobs-body">
                        <tr><td colspan="4" class="empty-state">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>Data collected daily via GitHub Actions. <a href="https://github.com/acharles-dev/link-intel">View source on GitHub</a>.</p>
        </div>
    </footer>

    <script src="js/app.js"></script>
</body>
</html>
